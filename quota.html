<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Usage Query</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; background: #f5f7fb; }
        .card { background: white; border-radius: 20px; padding: 28px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
        h2 { margin-top: 0; }
        input, button { width: 100%; padding: 12px; margin-top: 12px; border-radius: 12px; border: 1px solid #d1d5db; font-size: 16px; }
        button { background: #2563eb; color: white; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
        button:hover { background: #1d4ed8; }
        .result { margin-top: 20px; background: #eef2ff; padding: 16px; border-radius: 16px; font-family: monospace; white-space: pre-wrap; display: none; }
        .error { background: #fee2e2; color: #b91c1c; }
    </style>
</head>
<body>
<div class="card">
    <h2>🔍 Token Usage Checker</h2>
    <p>Enter the <strong>Token ID</strong> you received in your payment confirmation email.</p>
    <input type="number" id="tokenId" placeholder="e.g. 12345" autocomplete="off">
    <button id="checkBtn">Check Usage</button>
    <div id="result" class="result"></div>
</div>

<script>
    const tokenIdInput = document.getElementById('tokenId');
    const checkBtn = document.getElementById('checkBtn');
    const resultDiv = document.getElementById('result');

    checkBtn.addEventListener('click', async () => {
        const tokenId = tokenIdInput.value.trim();
        if (!tokenId) {
            showError('Please enter a Token ID.');
            return;
        }
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = 'Checking...';
        resultDiv.classList.remove('error');
        try {
            const response = await fetch('https://webhook.abqu.com/api/quota', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token_id: parseInt(tokenId, 10) })
            });
            const data = await response.json();
            if (!response.ok || !data.success) {
                throw new Error(data.error || 'Token not found');
            }
            displayResult(data.data);
        } catch (err) {
            showError(err.message);
        }
    });

    function displayResult(token) {
        const formatDate = (ts) => ts ? new Date(ts * 1000).toLocaleString() : 'Never';
        const statusText = token.status === 1 ? 'Active' : 'Disabled';
        resultDiv.innerHTML = `
            <div><strong>Token ID:</strong> ${token.id}</div>
            <div><strong>Status:</strong> ${statusText}</div>
            <div><strong>Remaining Quota:</strong> ${token.remain_quota?.toLocaleString() ?? 'N/A'} tokens</div>
            <div><strong>Used Quota:</strong> ${token.used_quota?.toLocaleString() ?? 'N/A'} tokens</div>
            <div><strong>Expires:</strong> ${token.expired_time === -1 ? 'Never' : formatDate(token.expired_time)}</div>
        `;
    }

    function showError(msg) {
        resultDiv.classList.add('error');
        resultDiv.innerHTML = `❌ ${msg}`;
    }
</script>
</body>
</html>
